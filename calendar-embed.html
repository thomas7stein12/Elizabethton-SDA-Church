<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elizabethton SDA Church</title>

    <link rel="stylesheet" href="calendar.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="calendar.js" defer></script>

    <script
      src="https://kit.fontawesome.com/7178c88896.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
      <!-- HERO -->

        <button class="hero_arrow hero_prev">
          <i class="fas fa-chevron-left"></i>
        </button>

        <button class="hero_arrow hero_next">
          <i class="fas fa-chevron-right"></i>
        </button>
      <!-- CALENDAR -->
    <section class="calendar_page">
      <div class="row">
        <div class="next_event">
            <span class="event_label">NEXT GATHERING</span>

            <h1 id="nextTitle">No Gatherings</h1>

            <p id="nextDate"> </p>

            <div class="event_location" id="nextLocation">
                <i class="fas fa-location-dot"></i>
            </div>

            <a href="#" class="directions_btn" onclick="openContact()">Contact Us</a>
        </div>

        <div class="calendar_container">
          <div class="calendar_header">
            <button id="prevMonth">
              <i class="fas fa-chevron-left"></i>
            </button>

            <h2 id="monthYear"></h2>

            <button id="nextMonth">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>

          <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>

          <div id="calendar"></div>
        </div>
      </div>
    </section>
  </body>
</html>
