<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elizabethton SDA Church</title>

    <link rel="stylesheet" href="calendar.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="calendar.js" defer></script>

    <script
      src="https://kit.fontawesome.com/7178c88896.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- MOBILE MENU -->

    <section id="landing">
      <div class="menu">
        <button class="btn_menu btn_menu-close" onclick="closeMenu()">
          <i class="fas fa-times"></i>
        </button>

        <div class="menu_links">
          <a class="menu_link menu_link-primary" href="./index.html"> Home </a>
        </div>
      </div>

      <div class="overlay" onclick="closeMenu()"></div>

      <!-- NAV -->

      <nav class="nav">
        <div class="nav_container row">
          <div class="nav_logo">
            <img src="/assets/logo.png" alt="Church Logo" />
          </div>

          <div class="nav_links">
            <a class="nav_link sign-up" href="./index.html"> Home </a>
          </div>

          <button class="btn_menu" onclick="openMenu()">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </nav>
    </section>
    <section class="calendar_page">
      <div class="row">
        <div class="next_event">
          <span class="event_label"> NEXT GATHERING </span>

          <h1>Sabbath Worship Service</h1>

          <p>Saturday, June 13 • 11:00 AM</p>

          <div class="event_location">
            <i class="fas fa-location-dot"></i>
            Elizabethton Community Center
          </div>

          <a href="#" class="directions_btn"> Get Directions </a>
        </div>

        <div class="calendar_container">
          <div class="calendar_header">
            <button id="prevMonth">
              <i class="fas fa-chevron-left"></i>
            </button>

            <h2 id="monthYear"></h2>

            <button id="nextMonth">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>

          <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>

          <div id="calendar"></div>
        </div>
      </div>
    </section>
    <footer>
      <div class="footer_container">
        <img src="/assets/logo.png" alt="Church Logo" />

        <h3>Elizabethton SDA Church</h3>

        <p>Sharing hope. Growing faith. Serving our community.</p>

        <div class="footer_socials">
          <a href="#">
            <i class="fab fa-facebook-f"></i>
          </a>

          <a href="tel:4230000000">
            <i class="fas fa-phone"></i>
          </a>

          <a href="mailto:info@elizabethtonsda.org">
            <i class="fas fa-envelope"></i>
          </a>
        </div>

        <p>© 2026 Elizabethton SDA Church. All Rights Reserved.</p>
      </div>
    </footer>
  </body>
</html>
